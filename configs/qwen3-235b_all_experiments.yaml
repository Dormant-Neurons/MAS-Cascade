# Qwen3-235B — All Experiments
# Topologies: complete-6a, pstar-hub-6a, pstar-leaf-6a | Datasets: csqa_100, toolbench_100
# Attacker: Ihigh-Alow (high persuasion, low agreeableness)

defaults:
  model: "qwen3-235b"
  model_dir_name: qwen3-235b
  backend: vllm
  max_tokens: 2048
  rounds: 10
  save_json: true
  log_belief_csv: true
  log_trust_csv: true
  trust_gamma: 2.0
  trust_lr: 0.4
  parallel: true
  max_workers: 8
  no_trust: true
  warmup: 0
  fixed_trust: false
  adaptive_attacker: false

